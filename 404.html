<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found | Dev Tank</title>

    <meta name="robots" content="noindex">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Inter,system-ui,sans-serif;

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            background:#ffffff;

            color:#111827;

            text-align:center;

            padding:2rem;

        }

        .container{

            max-width:700px;

        }

        h1{

            font-size:8rem;

            color:#2563eb;

            line-height:1;

            margin-bottom:1rem;

        }

        h2{

            font-size:2rem;

            margin-bottom:1rem;

        }

        p{

            color:#6b7280;

            line-height:1.8;

            margin-bottom:2rem;

            font-size:1.05rem;

        }

        .btn{

            display:inline-flex;

            align-items:center;

            justify-content:center;

            padding:1rem 2rem;

            background:#2563eb;

            color:#ffffff;

            text-decoration:none;

            border-radius:999px;

            font-weight:600;

            transition:.3s;

        }

        .btn:hover{

            background:#1d4ed8;

            transform:translateY(-3px);

        }

        @media(max-width:768px){

            h1{

                font-size:6rem;

            }

            h2{

                font-size:1.6rem;

            }

        }

    </style>

</head>

<body>

    <main class="container">

        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>
            The page you're looking for doesn't exist,
            may have been moved, or the URL is incorrect.
        </p>

        <a href="https://devtankcodes.github.io/devtank-portfolio/" class="btn">
            ← Back to Home
        </a>

    </main>

</body>

</html>
